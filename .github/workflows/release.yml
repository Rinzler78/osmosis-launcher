name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up bash and dependencies
        run: sudo apt-get update && sudo apt-get install -y git shellcheck

      - name: Fast shell validation
        run: |
          chmod +x tests/*.sh
          shellcheck -x -e SC1091 make.sh src/*.sh tests/*.sh
          tests/test_01_parse_args.sh
          tests/test_07_patch.sh
          tests/test_12_launcher.sh
          tests/test_13_root_make.sh

      - name: Run all test scripts
        run: |
          chmod +x tests/*.sh
          RUN_SLOW_TESTS=1 tests/test_all.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release for tag ${{ github.ref_name }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
